version: '3.9'

services:
  presence:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    devices:
      # Linux / Raspberry Pi 5 camera passthrough
      - /dev/video0:/dev/video0
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/presence.db
      - INSIGHTFACE_HOME=/data/insightface_models
      - CAMERA_INDEX=0
    ports:
      # Single port: FastAPI serves both API and frontend
      - "8000:8000"
